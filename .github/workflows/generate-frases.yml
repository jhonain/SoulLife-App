# generate-frases.yml
# GitHub Actions — Genera 5 frases diarias automáticamente con Groq + Pexels
# Se ejecuta todos los días a las 6am (hora Perú, UTC-5 = 11am UTC)

name: Generar Frases Diarias

on:
  schedule:
    - cron: '0 11 * * *' # 6am hora Perú (UTC-5)
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Correr script de generación
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/generateFrases.cjs
